name: Static Analysis ( ESLint, Typecheck ) 

on:
  pull_request:
    branches:
      - staging
      - main

jobs:
  backend-static:
    name: Backend static analysis
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Run lint (non-blocking)
        run: npm run lint
        continue-on-error: true
      - run: npm run typecheck

  backend-tests-build:
    name: Backend tests & build
    runs-on: ubuntu-latest
    needs: backend-static
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

  frontend-static:
    name: Frontend static analysis
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Run lint (non-blocking)
        run: npm run lint
        continue-on-error: true
      - run: npm run typecheck

  frontend-tests-build:
    name: Frontend tests & build
    runs-on: ubuntu-latest
    needs: frontend-static
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
