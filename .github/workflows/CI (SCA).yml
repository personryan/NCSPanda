name: SCA (npm audit)

on:
  pull_request:
  push:
    branches: [staging]

jobs:
  backend-security:
    name: Backend dependency audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Run npm audit (fail on high/critical)
        run: |
          npm audit --audit-level=high --json > ../backend-audit.json
          npm audit --audit-level=high
      - name: Upload backend security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-security-report
          path: backend-audit.json

  frontend-security:
    name: Frontend dependency audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Run npm audit (fail on high/critical)
        run: |
          npm audit --audit-level=high --json > ../frontend-audit.json
          npm audit --audit-level=high
      - name: Upload frontend security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-security-report
          path: frontend-audit.json
