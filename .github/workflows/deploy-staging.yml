name: Deploy Staging

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend deps
        run: npm ci
        working-directory: backend

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Build backend
        run: npm run build
        working-directory: backend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Deploy to staging
        run: |
          echo "Deploy step placeholder: integrate with your hosting provider CLI"
          echo "Expected env: STAGING_API_BASE_URL, STAGING_DEPLOY_TOKEN"

      - name: Run staging smoke checks
        env:
          STAGING_API_BASE_URL: ${{ secrets.STAGING_API_BASE_URL }}
        run: node scripts/smoke/staging-smoke.js

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-smoke-log
          path: scripts/smoke/staging-smoke.js
