name: Image Build, Scan, and Deploy to Staging >> DAST >> Smoke Tests

on:
  push:
    branches: [staging]

concurrency:
  group: staging-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  GHCR_OWNER: ${{ github.repository_owner }}
  BACKEND_IMAGE_REPO: ncspanda-backend
  FRONTEND_IMAGE_REPO: ncspanda-frontend
  STAGING_URL: ${{ secrets.STAGING_URL }}
  DO_APP_NAME_STAGING: ${{ secrets.DO_APP_NAME_STAGING }}
  IMAGE_TAG: staging-${{ github.sha }}

jobs:
  Continuous-Deployment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build locally for scanning (then push only if scan passes)
      - name: Build backend image (local for scan, cached)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          load: true
          push: false
          platforms: linux/amd64
          tags: localbuild/backend:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image (local for scan)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          load: true
          push: false
          platforms: linux/amd64
          tags: localbuild/frontend:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan backend image (fail on critical)
        uses: anchore/scan-action@v7
        with:
          image: localbuild/backend:scan
          fail-build: false #temporary to test workflow
          severity-cutoff: critical

      - name: Scan frontend image (fail on critical)
        uses: anchore/scan-action@v7
        with:
          image: localbuild/frontend:scan
          fail-build: false #temporary to test workflow
          severity-cutoff: critical

      # Push to GHCR (capture digests)
      - name: Build + push backend (GHCR)
        id: push_backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.GHCR_OWNER }}/${{ env.BACKEND_IMAGE_REPO }}:staging
            ${{ env.REGISTRY }}/${{ env.GHCR_OWNER }}/${{ env.BACKEND_IMAGE_REPO }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build + push frontend (GHCR)
        id: push_frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.GHCR_OWNER }}/${{ env.FRONTEND_IMAGE_REPO }}:staging
            ${{ env.REGISTRY }}/${{ env.GHCR_OWNER }}/${{ env.FRONTEND_IMAGE_REPO }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Restore archived DO app (if archived)
        env:
          DO_TOKEN: ${{ secrets.NCSPANDA_DOSTAGING }}
          DO_APP_NAME: ${{ secrets.DO_APP_NAME_STAGING }}
        run: |
          set -euo pipefail

          API="https://api.digitalocean.com/v2"
          HDR_AUTH="Authorization: Bearer $DO_TOKEN"
          HDR_CT="Content-Type: application/json"

          # Find app ID by app spec name
          APP_ID=$(curl -fsS -H "$HDR_AUTH" "$API/apps?per_page=200" \
            | jq -r --arg NAME "$DO_APP_NAME" '.apps[] | select(.spec.name == $NAME) | .id' \
            | head -n1)

          if [ -z "${APP_ID:-}" ] || [ "$APP_ID" = "null" ]; then
            echo "App not found for name: $DO_APP_NAME"
            exit 1
          fi

          # Read current app spec + archive state
          APP_JSON=$(curl -fsS -H "$HDR_AUTH" "$API/apps/$APP_ID")
          IS_ARCHIVED=$(echo "$APP_JSON" | jq -r '.app.spec.maintenance.archive // false')

          if [ "$IS_ARCHIVED" != "true" ]; then
            echo "App is not archived. No restore needed."
            exit 0
          fi

          echo "App is archived. Restoring..."
          UPDATED_SPEC=$(echo "$APP_JSON" | jq '.app.spec | .maintenance = ((.maintenance // {}) + {archive:false})')
          jq -n --argjson spec "$UPDATED_SPEC" '{spec:$spec}' > restore-payload.json

          curl -fsS -X PUT "$API/apps/$APP_ID" \
            -H "$HDR_AUTH" \
            -H "$HDR_CT" \
            --data @restore-payload.json > /dev/null

          echo "Restore request submitted."

      - name: Deploy to DigitalOcean App Platform
        uses: digitalocean/app_action/deploy@v2
        env:
          IMAGE_TAG_PERSONRYAN-NCSPANDA-BACKEND: ${{ env.IMAGE_TAG }}
          IMAGE_TAG_PERSONRYAN-NCSPANDA-FRONTEND: ${{ env.IMAGE_TAG }}
        with:
          token: ${{ secrets.NCSPANDA_DOSTAGING }}
          app_name: ${{ env.DO_APP_NAME_STAGING }}
          print_build_logs: "true"
          print_deploy_logs: "true"

      - name: Staging Environment Health Check
        run: |
          # initial wait before starting checks (optional, can be adjusted or removed)
          sleep 60 
          # This loop pings the URL every 5 seconds, timing out after 5 minutes (300s)
          timeout 300s bash -c 'until curl -sIL ${{ secrets.STAGING_URL }} | grep "200"; do echo "Still waiting..."; sleep 5; done'
        shell: bash

      - name: OWASP ZAP Baseline (DAST)
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: ${{ secrets.STAGING_URL }}
          fail_action: false
          allow_issue_writing: false # disable automatic issue creation in GH
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke Test
        env:
          STAGING_API_BASE_URL: ${{ secrets.STAGING_URL }}
        run: node scripts/smoke/staging-smoke.js

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-smoke-log
          path: scripts/smoke/staging-smoke.js
