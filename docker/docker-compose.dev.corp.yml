version: "3.9"

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ncs
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ncs_panda_dev
    ports:
      - "55432:5432"
    volumes:
      - db_data_dev:/var/lib/postgresql/data

  backend:
    image: ncs_panda_backend_dev
    build: 
      context: ..
      dockerfile: backend/Dockerfile
      target: with-cert
    working_dir: /app
    command: npm run start:dev
    volumes:
      - ../backend:/app
    environment:
      DATABASE_URL: postgres://ncs:password@db:5432/ncs_panda_dev
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      - db

  frontend:
    image: ncs_panda_frontend_dev
    build: 
      context: .. 
      dockerfile: frontend/Dockerfile
      target: with-cert
    working_dir: /app
    volumes:
      - ../frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:3000
    depends_on:
      - backend

volumes:
  db_data_dev:
