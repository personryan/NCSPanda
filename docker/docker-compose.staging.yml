version: "3.9"

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ncs
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ncs_panda_staging
    volumes:
      - db_data_staging:/var/lib/postgresql/data

  backend:
    build: ../backend
    working_dir: /app
    environment:
      DATABASE_URL: postgres://ncs:password@db:5432/ncs_panda_staging
      NODE_ENV: staging
      CORS_ORIGIN: ${STAGING_FRONTEND_ORIGIN:-http://localhost:5173}
    depends_on:
      - db

  frontend:
    build: ../frontend
    working_dir: /app
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    depends_on:
      - backend

volumes:
  db_data_staging:
