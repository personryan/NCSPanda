version: "3.9"

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ncs
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ncs_panda_staging
    volumes:
      - db_data_staging:/var/lib/postgresql/data

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      target: runtime
    working_dir: /app
    environment:
      DATABASE_URL: postgres://ncs:password@db:5432/ncs_panda_staging
      NODE_ENV: staging
      CORS_ORIGIN: ${STAGING_FRONTEND_ORIGIN:-http://localhost:5173}
    depends_on:
      - db

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      target: runtime
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    working_dir: /app
    ports:
      - "4173:4173"
    depends_on:
      - backend

volumes:
  db_data_staging:
